    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .event-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            margin: 2rem 0 3rem;
        }
        
        .event-meta-list {
            background: var(--color-hover);
            border-radius: var(--radius-lg);
            padding: 2rem;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid var(--color-border);
        }
        
        .meta-item:last-child {
            border-bottom: none;
        }
        
        .speaker-card {
            display: flex;
            gap: 2rem;
            align-items: center;
            background: var(--color-hover);
            border-radius: var(--radius-lg);
            padding: 2rem;
            margin: 2rem 0;
        }
        
        .speaker-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--color-border);
        }
        
        @media (max-width: 768px) {
            .event-header {
                grid-template-columns: 1fr;
            }
            .speaker-card {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
